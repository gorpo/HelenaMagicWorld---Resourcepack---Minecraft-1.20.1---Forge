<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-label="MagicHemp Resource Pack Minecraft 1.20.1">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061108"/>
      <stop offset="0.42" stop-color="#08240d"/>
      <stop offset="1" stop-color="#010402"/>
    </linearGradient>
    <radialGradient id="glow" cx="62%" cy="45%" r="48%">
      <stop offset="0" stop-color="#80ff38" stop-opacity="0.85"/>
      <stop offset="0.25" stop-color="#42c818" stop-opacity="0.42"/>
      <stop offset="0.65" stop-color="#0f3b10" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.75"/>
    </filter>
    <pattern id="blocks" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#09210d"/>
      <rect width="48" height="48" fill="#123a17"/>
      <rect x="48" y="48" width="48" height="48" fill="#0d2f12"/>
      <path d="M0 48H96M48 0V96" stroke="#1b5d20" stroke-opacity="0.28" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect width="1600" height="520" fill="url(#blocks)" opacity="0.35"/>
  <rect width="1600" height="520" fill="url(#glow)"/>
  <rect x="10" y="10" width="1580" height="500" fill="none" stroke="#54ff24" stroke-width="4"/>
  <rect x="26" y="26" width="1548" height="468" fill="none" stroke="#143d14" stroke-width="3"/>

  <g opacity="0.75">
    <circle cx="1110" cy="126" r="6" fill="#c8ff9b" filter="url(#softGlow)"/>
    <circle cx="1220" cy="200" r="4" fill="#65ff32" filter="url(#softGlow)"/>
    <circle cx="990" cy="330" r="5" fill="#93ff58" filter="url(#softGlow)"/>
    <circle cx="1360" cy="112" r="7" fill="#e0ffc9" filter="url(#softGlow)"/>
    <circle cx="1425" cy="360" r="4" fill="#78ff39" filter="url(#softGlow)"/>
  </g>

  <g transform="translate(94 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="220" rx="18" fill="#081008" stroke="#56ff25" stroke-width="4"/>
    <rect x="22" y="24" width="74" height="74" fill="#3b2a18" stroke="#6d4d2b" stroke-width="3"/>
    <rect x="100" y="24" width="74" height="74" fill="#38a337" stroke="#7dff58" stroke-width="3"/>
    <rect x="62" y="102" width="74" height="74" fill="#1d571d" stroke="#56ff25" stroke-width="3"/>
    <path d="M110 46 C83 70 70 104 88 146 C118 122 138 90 110 46Z" fill="#6dff38" stroke="#d7ffb8" stroke-width="3"/>
    <path d="M104 102 L154 72 M104 102 L74 62 M104 102 L102 160" stroke="#eaffdb" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(1260 72)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="300" rx="22" fill="#071007" stroke="#56ff25" stroke-width="4"/>
    <rect x="30" y="34" width="78" height="78" fill="#1b4b1d" stroke="#8dff5e" stroke-width="3"/>
    <rect x="132" y="34" width="78" height="78" fill="#2b2b2b" stroke="#cfcfcf" stroke-width="3"/>
    <rect x="30" y="136" width="78" height="78" fill="#123c6b" stroke="#50b7ff" stroke-width="3"/>
    <rect x="132" y="136" width="78" height="78" fill="#5a421d" stroke="#ffcb4c" stroke-width="3"/>
    <text x="120" y="262" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="34" fill="#ffffff">4 PACKS</text>
  </g>

