    <text x="800" y="228" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="64" fill="#70ff2d" stroke="#061006" stroke-width="5">RESOURCE PACK</text>
    <text x="800" y="292" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="34" fill="#ffffff">MINECRAFT JAVA 1.20.1</text>
  </g>

  <g transform="translate(405 338)">
    <rect x="0" y="0" width="790" height="88" rx="12" fill="#061006" fill-opacity="0.78" stroke="#56ff25" stroke-width="3"/>
    <text x="395" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#70ff2d">Premium526X -> Models -> Addon -> Bonus</text>
    <text x="395" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#f0f0f0">Use junto com o mod Magic Hemp Forge para a experiencia completa</text>
